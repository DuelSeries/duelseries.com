<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DuelSeries</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/agar.css" />
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="hud-leaderboard">
    <div class="hud-lb-title" id="hud-lb-title">LEADERBOARD</div>
    <div id="hud-lb-rows"></div>
  </div>

  <div id="hud-bottomleft">
    <div class="hud-tip"><kbd>SPACE</kbd> Split</div>
  </div>

  <div id="hud-bottomright">
    <div id="agar-ping-display"><span id="agar-ping-dot" class="ping-dot ping-green"></span><span id="agar-ping-value">-- ms</span></div>
    <div id="agar-fps-counter">FPS: --</div>
  </div>

  <!-- Death screen -->
  <div id="death-screen">
    <h2 id="death-title">YOU WERE EATEN</h2>
    <p>Score: <span id="death-score-val">0</span></p>
    <p id="death-earned-row" style="display:none">Earned: <span id="death-earned-val" style="color:#14F195;font-weight:700"></span></p>
    <div class="cashout-btn-row">
      <button id="btn-respawn" class="co-btn co-btn-play">&#9654; Play Again</button>
      <button id="btn-spectate" class="co-btn co-btn-spectate">&#128065; Spectate</button>
      <button id="btn-death-lobby" class="co-btn co-btn-lobby">&#8592; Lobby</button>
    </div>
  </div>

  <!-- Spectate bar -->
  <div id="spectate-bar">
    <button id="spectate-prev">&#8592;</button>
    <span id="spectate-label">Spectating: —</span>
    <button id="spectate-next">&#8594;</button>
    <button id="spectate-stop">&#8592; Lobby</button>
  </div>

  <!-- Cashout screen -->
  <div id="cashout-overlay">
    <h2>CASHED OUT</h2>
    <p>Score: <span id="cashout-score-val">0</span></p>
    <p id="cashout-worth-row" style="display:none">Earned: <span id="cashout-worth-val" style="color:#fde047;font-weight:700"></span></p>
    <div class="cashout-btn-row">
      <button id="btn-cashout-respawn" class="co-btn co-btn-play">&#9654; Play Again</button>
      <button id="btn-cashout-spectate" class="co-btn co-btn-spectate">&#128065; Spectate</button>
      <button id="btn-cashout-lobby" class="co-btn co-btn-lobby">&#8592; Lobby</button>
    </div>
  </div>

  <!-- Admin console -->
  <div id="admin-console" class="hidden">
    <div id="admin-console-inner">
      <span id="admin-console-prompt">&#62;</span>
      <input id="admin-input" type="text" autocomplete="off" spellcheck="false" placeholder="bot 3" maxlength="40" />
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/agar.js"></script>
</body>
</html>
