<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snake Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070707; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>

const SNAKE_SEG_COUNT   = 60;
const SNAKE_SEG_SPACING = 3;
const SNAKE_HEAD_RADIUS = 10;
const SNAKE_LENGTH      = 100;
const SCALE             = 3;

const canvas = document.getElementById('c');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext('2d');

let W = canvas.width  / SCALE;
let H = canvas.height / SCALE;

function buildSegs() {
  const segs = new Float32Array(SNAKE_SEG_COUNT * 2);
  const bodyLen = (SNAKE_SEG_COUNT - 1) * SNAKE_SEG_SPACING;
  const tiltRad = 0.09; // ~5 degrees — nearly vertical
  for (let i = 0; i < SNAKE_SEG_COUNT; i++) {
    const t = i / (SNAKE_SEG_COUNT - 1);
    const wave = Math.sin(t * Math.PI) * 1.5; // tiny organic bow
    segs[i * 2]     = W / 2 + wave + i * SNAKE_SEG_SPACING * Math.sin(tiltRad);
    segs[i * 2 + 1] = H / 2 + bodyLen / 2 - i * SNAKE_SEG_SPACING * Math.cos(tiltRad);
  }
  return segs;
}

const segs = buildSegs();
const snake = {
  segs,
  length: SNAKE_LENGTH,
  angle: Math.atan2(segs[1] - segs[3], segs[0] - segs[2]),
};

let mousePos = null;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mousePos = { x: (e.clientX - r.left) / SCALE, y: (e.clientY - r.top) / SCALE };
});

const STEPS = 6;

function tracePath() {
  const SN = segs.length >> 1;
  ctx.beginPath();
  ctx.moveTo(segs[(SN-1)*2], segs[(SN-1)*2+1]);
  for (let i = SN - 2; i >= 0; i--) {
    const p0x = segs[Math.min(SN-1,i+2)*2],   p0y = segs[Math.min(SN-1,i+2)*2+1];
    const p1x = segs[(i+1)*2],                 p1y = segs[(i+1)*2+1];
    const p2x = segs[i*2],                     p2y = segs[i*2+1];
    const p3x = segs[Math.max(0,i-1)*2],       p3y = segs[Math.max(0,i-1)*2+1];
    for (let s = 1; s <= STEPS; s++) {
      const t=s/STEPS, t2=t*t, t3=t2*t;
      ctx.lineTo(
        0.5*((2*p1x)+(-p0x+p2x)*t+(2*p0x-5*p1x+4*p2x-p3x)*t2+(-p0x+3*p1x-3*p2x+p3x)*t3),
        0.5*((2*p1y)+(-p0y+p2y)*t+(2*p0y-5*p1y+4*p2y-p3y)*t2+(-p0y+3*p1y-3*p2y+p3y)*t3)
      );
    }
  }
}

function sampleSpine() {
  const SN = segs.length >> 1;
  const pts = [];
  for (let i = SN - 2; i >= 0; i--) {
    const p0x = segs[Math.min(SN-1,i+2)*2],   p0y = segs[Math.min(SN-1,i+2)*2+1];
    const p1x = segs[(i+1)*2],                 p1y = segs[(i+1)*2+1];
    const p2x = segs[i*2],                     p2y = segs[i*2+1];
    const p3x = segs[Math.max(0,i-1)*2],       p3y = segs[Math.max(0,i-1)*2+1];
    for (let s = 0; s < STEPS; s++) {
      const t=s/STEPS, t2=t*t, t3=t2*t;
      const x  = 0.5*((2*p1x)+(-p0x+p2x)*t+(2*p0x-5*p1x+4*p2x-p3x)*t2+(-p0x+3*p1x-3*p2x+p3x)*t3);
      const y  = 0.5*((2*p1y)+(-p0y+p2y)*t+(2*p0y-5*p1y+4*p2y-p3y)*t2+(-p0y+3*p1y-3*p2y+p3y)*t3);
      const dx = 0.5*((-p0x+p2x)+(2*(2*p0x-5*p1x+4*p2x-p3x))*t+(3*(-p0x+3*p1x-3*p2x+p3x))*t2);
      const dy = 0.5*((-p0y+p2y)+(2*(2*p0y-5*p1y+4*p2y-p3y))*t+(3*(-p0y+3*p1y-3*p2y+p3y))*t2);
      const len = Math.sqrt(dx*dx+dy*dy) || 1;
      pts.push({ x, y, nx: -dy/len, ny: dx/len });
    }
  }
  return pts;
}

function drawSnake(ctx) {
  const SN = segs.length >> 1;
  if (SN < 2) return;

  const R = SNAKE_HEAD_RADIUS * (1 + Math.min(1.5, SNAKE_LENGTH / 200));

  ctx.save();
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  const sp = (w, color, blur, blurColor) => {
    tracePath();
    ctx.lineWidth   = w;
    ctx.strokeStyle = color;
    if (blur) { ctx.shadowBlur = blur; ctx.shadowColor = blurColor || color; }
    ctx.stroke();
    ctx.shadowBlur = 0;
  };

  // Colours sampled directly from snake_sprite.png — muted grey-teal cylinder
  // ── 1. Soft glow halo ──────────────────────────────────────────────────────
  sp(R * 2.5, 'rgba(95,170,164,0.01)', 26, 'rgba(95,170,164,0.55)');

  // ── 2. Dark outer edge of the tube ─────────────────────────────────────────
  sp(R * 2.0, '#294040');

  // ── 3. Shoulder ────────────────────────────────────────────────────────────
  sp(R * 1.6, '#3e6967');

  // ── 4. Main body colour ────────────────────────────────────────────────────
  sp(R * 1.15, '#4f8786');

  // ── 5. Lighter centre band ─────────────────────────────────────────────────
  sp(R * 0.6, '#62a09e');

  // ── 6. Soft highlight (muted, NOT white) ───────────────────────────────────
  sp(R * 0.26, 'rgba(125,180,176,0.55)');

  // ── Segment rings — subtle darker bands across the body ────────────────────
  const pts = sampleSpine();
  ctx.lineCap     = 'butt';
  ctx.lineWidth   = 2;
  ctx.strokeStyle = 'rgba(22,46,45,0.45)';
  for (let i = 6; i < pts.length; i += 7) {
    const p = pts[i];
    ctx.beginPath();
    ctx.moveTo(p.x - p.nx * R, p.y - p.ny * R);
    ctx.lineTo(p.x + p.nx * R, p.y + p.ny * R);
    ctx.stroke();
  }
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  // ── Head ──────────────────────────────────────────────────────────────────
  const { angle } = snake;
  const hx = segs[0], hy = segs[1];
  const fwdX = Math.cos(angle), fwdY = Math.sin(angle);
  const perpX = -Math.sin(angle), perpY = Math.cos(angle);

  const fc = (cx, cy, r, color, blur, blurC) => {
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    if (blur) { ctx.shadowBlur = blur; ctx.shadowColor = blurC || color; }
    ctx.fill();
    ctx.shadowBlur = 0;
  };

  fc(hx, hy, R * 1.25, 'rgba(95,170,164,0.01)', 26, 'rgba(95,170,164,0.55)');
  fc(hx, hy, R,         '#294040');
  fc(hx, hy, R * 0.8,   '#3e6967');
  fc(hx, hy, R * 0.6,   '#4f8786');
  fc(hx, hy, R * 0.32,  '#62a09e');

  // soft muted highlight offset toward "light source"
  const hlg = ctx.createRadialGradient(
    hx - perpX * R * 0.28, hy - perpY * R * 0.28, 0,
    hx, hy, R * 0.9
  );
  hlg.addColorStop(0,   'rgba(125,180,176,0.45)');
  hlg.addColorStop(1,   'rgba(125,180,176,0)');
  ctx.beginPath(); ctx.arc(hx, hy, R, 0, Math.PI * 2);
  ctx.fillStyle = hlg; ctx.fill();

  // ── Eyes — small, close together, near the front ──────────────────────────
  const eyeR   = R * 0.34;
  const pupilR = eyeR * 0.6;
  const eyeSide = R * 0.34;
  const eyeFwd  = R * 0.5;

  let pupilFwdX = fwdX, pupilFwdY = fwdY;
  if (mousePos) {
    const pa = Math.atan2(mousePos.y - hy, mousePos.x - hx);
    pupilFwdX = Math.cos(pa); pupilFwdY = Math.sin(pa);
  }

  for (const side of [-1, 1]) {
    const ex = hx + fwdX * eyeFwd + perpX * eyeSide * side;
    const ey = hy + fwdY * eyeFwd + perpY * eyeSide * side;
    ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    const ps = eyeR - pupilR;
    ctx.beginPath(); ctx.arc(ex + pupilFwdX * ps, ey + pupilFwdY * ps, pupilR, 0, Math.PI * 2);
    ctx.fillStyle = '#0a0a0a'; ctx.fill();
  }

  ctx.restore();
}

function draw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  drawSnake(ctx);
}

draw();
canvas.addEventListener('mousemove', draw);
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width  / SCALE;
  H = canvas.height / SCALE;
  draw();
});

</script>
</body>
</html>
