<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Snake Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070707; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>

// ── Config ────────────────────────────────────────────────────────────────────
const SNAKE_COLOR       = '#4af';       // change this to try different colours
const SNAKE_SEG_COUNT   = 60;           // how many segments (length)
const SNAKE_SEG_SPACING = 3;            // world units between segments (matches game)
const SNAKE_HEAD_RADIUS = 10;           // matches game constant
const SNAKE_LENGTH      = 100;          // affects how thick it grows (same scale as game)
const SCALE             = 3;            // screen pixels per world unit
// ─────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById('c');
canvas.width  = window.innerWidth;
canvas.height = window.innerHeight;
const ctx = canvas.getContext('2d');

const W = canvas.width  / SCALE;
const H = canvas.height / SCALE;

// Build a curved snake path (head at index 0, tail at end)
const segs = new Float32Array(SNAKE_SEG_COUNT * 2);
const bodyLen = (SNAKE_SEG_COUNT - 1) * SNAKE_SEG_SPACING;
for (let i = 0; i < SNAKE_SEG_COUNT; i++) {
  const t = i / (SNAKE_SEG_COUNT - 1);
  segs[i * 2]     = W / 2 + bodyLen / 2 - i * SNAKE_SEG_SPACING;
  segs[i * 2 + 1] = H / 2 + Math.sin(t * Math.PI * 2) * 45;
}

const snake = {
  segs,
  length: SNAKE_LENGTH,
  color:  SNAKE_COLOR,
  angle:  Math.atan2(segs[1] - segs[3], segs[0] - segs[2]),
};

let mousePos = null;
canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mousePos = {
    x: (e.clientX - r.left) / SCALE,
    y: (e.clientY - r.top)  / SCALE,
  };
});

function draw() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.fillStyle = '#070707';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  drawSnake(ctx, snake);
}

function drawSnake(ctx, snake) {
  const { segs, color, angle } = snake;
  const SN = segs.length >> 1;
  if (SN < 2) return;

  const growthScale = 1 + Math.min(1.5, (snake.length || 20) / 200);
  const R  = SNAKE_HEAD_RADIUS * growthScale;
  const HR = R;

  ctx.save();
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';

  const STEPS = 3;
  const CHUNK = 8;

  const drawBodyPath = () => {
    for (let end = SN - 1; end > 0; end -= CHUNK) {
      const start = Math.max(0, end - CHUNK);
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      ctx.moveTo(segs[end * 2], segs[end * 2 + 1]);
      for (let j = end - 1; j >= start; j--) {
        const pi = Math.min(SN-1,j+2)*2, ai=(j+1)*2, bi=j*2, ni=Math.max(0,j-1)*2;
        for (let s = 1; s <= STEPS; s++) {
          const t=s/STEPS, t2=t*t, t3=t2*t;
          ctx.lineTo(
            0.5*((2*segs[ai])+(-segs[pi]+segs[bi])*t+(2*segs[pi]-5*segs[ai]+4*segs[bi]-segs[ni])*t2+(-segs[pi]+3*segs[ai]-3*segs[bi]+segs[ni])*t3),
            0.5*((2*segs[ai+1])+(-segs[pi+1]+segs[bi+1])*t+(2*segs[pi+1]-5*segs[ai+1]+4*segs[bi+1]-segs[ni+1])*t2+(-segs[pi+1]+3*segs[ai+1]-3*segs[bi+1]+segs[ni+1])*t3)
          );
        }
      }
      ctx.lineWidth = R * 2;
      ctx.stroke();
    }
  };

  // ── Body ──────────────────────────────────────────────────────────────────
  ctx.strokeStyle = color;
  drawBodyPath();

  // ── Head ──────────────────────────────────────────────────────────────────
  const hx = segs[0], hy = segs[1];
  const fwdX = Math.cos(angle), fwdY = Math.sin(angle);
  const perpX = -Math.sin(angle), perpY = Math.cos(angle);

  ctx.beginPath();
  ctx.arc(hx, hy, HR, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();

  // ── Eyes ──────────────────────────────────────────────────────────────────
  const eyeR    = HR * 0.40;
  const pupilR  = eyeR * 0.54;
  const eyeSide = HR * 0.46;
  const eyeFwd  = HR * 0.38;

  let pupilFwdX = fwdX, pupilFwdY = fwdY;
  if (mousePos) {
    const pa = Math.atan2(mousePos.y - hy, mousePos.x - hx);
    pupilFwdX = Math.cos(pa);
    pupilFwdY = Math.sin(pa);
  }

  for (const side of [-1, 1]) {
    const ex = hx + fwdX * eyeFwd + perpX * eyeSide * side;
    const ey = hy + fwdY * eyeFwd + perpY * eyeSide * side;
    ctx.beginPath(); ctx.arc(ex, ey, eyeR, 0, Math.PI * 2);
    ctx.fillStyle = '#fff'; ctx.fill();
    const ps = eyeR - pupilR;
    ctx.beginPath(); ctx.arc(ex + pupilFwdX * ps, ey + pupilFwdY * ps, pupilR, 0, Math.PI * 2);
    ctx.fillStyle = '#060606'; ctx.fill();
  }

  ctx.restore();
}

draw();
canvas.addEventListener('mousemove', draw);
window.addEventListener('resize', () => {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
});

</script>
</body>
</html>
