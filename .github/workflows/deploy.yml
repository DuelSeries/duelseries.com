name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy-na:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to NA (Canada)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/hexslither
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            pm2 restart duelseries

  deploy-eu:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EU (Ireland)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_EU_HOST }}
          username: ${{ secrets.EC2_EU_USER }}
          key: ${{ secrets.EC2_EU_KEY }}
          script: |
            cd /home/ubuntu/hexslither
            git fetch origin main
            git reset --hard origin/main
            npm install --production
            pm2 restart duelseries-eu
